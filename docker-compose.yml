services:
  postgres:
    image: postgres:17-alpine
    container_name: blog-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BLOG_PLATFORM_DB_NAME:-blogplatform}
      POSTGRES_USER: ${BLOG_PLATFORM_DB_USER:-blogplatform}
      POSTGRES_PASSWORD: ${BLOG_PLATFORM_DB_PASSWORD:-blogplatform}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${BLOG_PLATFORM_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/scripts:/docker-entrypoint-initdb.d:ro
      - ./database/seeds:/seed-data:ro

  api:
    build:
      context: .
      dockerfile: src/backend/BlogPlatform.Api/Dockerfile
    container_name: blog-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: ${BLOG_PLATFORM_API_URLS:-http://0.0.0.0:8080}
      BLOG_PLATFORM_DB_HOST: postgres
      BLOG_PLATFORM_DB_PORT: 5432
      BLOG_PLATFORM_DB_NAME: ${BLOG_PLATFORM_DB_NAME:-blogplatform}
      BLOG_PLATFORM_DB_USER: ${BLOG_PLATFORM_DB_USER:-blogplatform}
      BLOG_PLATFORM_DB_PASSWORD: ${BLOG_PLATFORM_DB_PASSWORD:-blogplatform}
      BLOG_PLATFORM_FRONTEND_ORIGINS: ${BLOG_PLATFORM_FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      BLOG_PLATFORM_JWT_ISSUER: ${BLOG_PLATFORM_JWT_ISSUER:-blogplatform-api}
      BLOG_PLATFORM_JWT_AUDIENCE: ${BLOG_PLATFORM_JWT_AUDIENCE:-blogplatform-clients}
      BLOG_PLATFORM_JWT_SIGNING_KEY: ${BLOG_PLATFORM_JWT_SIGNING_KEY:-super-secret-demo-signing-key-change-me}
      BLOG_PLATFORM_JWT_EXPIRATION_MINUTES: ${BLOG_PLATFORM_JWT_EXPIRATION_MINUTES:-60}
    ports:
      - "${BLOG_PLATFORM_API_PORT:-5034}:8080"

  frontend:
    build:
      context: .
      dockerfile: src/frontend/blog-web/Dockerfile
    container_name: blog-platform-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5034}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${BLOG_PLATFORM_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./src/frontend/blog-web:/app
      - /app/node_modules
